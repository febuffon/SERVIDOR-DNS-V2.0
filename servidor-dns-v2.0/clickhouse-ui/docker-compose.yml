services:
  clickhouse-ui:
    image: nginx:alpine
    container_name: clickhouse-ui
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
