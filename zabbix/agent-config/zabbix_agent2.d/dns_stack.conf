# ============================================================
# UserParameters customizados - Monitoramento do Servidor DNS
# Unbound (via unbound-control) + ClickHouse (via Prometheus)
#
# Saude/recursos de containers Docker NAO usam UserParameter custom:
# o Zabbix Agent2 ja tem um plugin nativo "Docker" (chaves docker.*,
# ex: docker.containers.discovery, docker.container_info, .container_stats)
# habilitado automaticamente quando /var/run/docker.sock esta montado.
# ============================================================

# --- Unbound: estatisticas gerais ---
UserParameter=dns.unbound.stat[*],/etc/zabbix/scripts/unbound_stat.sh $1

# --- ClickHouse: metricas Prometheus ---
UserParameter=dns.clickhouse.stat[*],/etc/zabbix/scripts/clickhouse_stat.sh $1
