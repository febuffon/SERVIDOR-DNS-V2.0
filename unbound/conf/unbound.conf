server:
    interface: 0.0.0.0@5300
    interface: 0.0.0.0@53
    access-control: 127.0.0.0/8 allow
    access-control: 192.168.90.0/24 allow
    access-control: 172.16.0.0/12 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.17.0.0/16 allow
    access-control: 172.18.0.0/16 allow
    access-control: 0.0.0.0/0 refuse

    verbosity: 1

    chroot: ""

    module-config: "subnetcache validator iterator"

    max-client-subnet-ipv4: 24
    max-client-subnet-ipv6: 48
    min-client-subnet-ipv4: 24
    min-client-subnet-ipv6: 48

    client-subnet-zone: "."

    # Cache ampliado (server tem 13GB RAM)
    msg-cache-size: 256m
    rrset-cache-size: 512m

    num-threads: 8
    so-rcvbuf: 8m
    so-sndbuf: 8m
    outgoing-range: 8192
    outgoing-num-tcp: 50
    incoming-num-tcp: 200

    infra-cache-numhosts: 100000
    infra-cache-slabs: 8
    msg-cache-slabs: 8
    rrset-cache-slabs: 8
    key-cache-slabs: 8

    # Prefetch: renova entradas antes de expirar
    prefetch: yes
    prefetch-key: yes
    # TTL minimo elevado de 300 para 600s: reduz frequencia de cold-lookup
    # (picos de 100-360ms observados quando o TTL real do upstream expira,
    # ex: Akamai usa TTL de 300s para www.xbox.com)
    cache-min-ttl: 600
    cache-max-ttl: 86400

    # Responde do cache expirado imediatamente e renova em background
    serve-expired: yes
    serve-expired-ttl: 86400
    serve-expired-reply-ttl: 30
    serve-expired-client-timeout: 1800

    # Fetch paralelo de glue records - reduz latência cold lookup
    target-fetch-policy: "3 2 1 1 1"

    harden-below-nxdomain: yes
    harden-referral-path: no
    harden-dnssec-stripped: yes
    qname-minimisation: yes
    aggressive-nsec: yes
    rrset-roundrobin: yes

    hide-identity: yes
    hide-version: yes

    ip-ratelimit: 500
    ip-ratelimit-slabs: 8

    edns-tcp-keepalive: yes
    edns-buffer-size: 1232
    max-udp-size: 1232

    tcp-idle-timeout: 120

    domain-insecure: "flexnet.in"

    auto-trust-anchor-file: "/opt/unbound/etc/unbound/var/root.key"

    # Bloqueio cirurgico de AAAA (IPv6) para dominios Xbox/Microsoft hospedados
    # em Azure Front Door (*.tm-azurefd.net). Rota IPv6 do provedor ate essa
    # rede tem PMTUD quebrado (pacotes TLS grandes sao descartados, conexao
    # trava ate timeout). O registro A (IPv4) continua resolvendo normalmente
    # via forwarder - nao afeta nenhum outro dominio/servico.
    # Unbound nao propaga local-data por wildcard/CNAME, entao cada host
    # precisa ser listado individualmente (levantados via Playwright real
    # carregando a pagina completa do xbox.com).
    # Laudo: LAUDO_TECNICO_XBOX_IPV6_MTUD.pdf (nao versionado, armazenado
    # localmente em IA.CONFIG/projetos/relatorios-pdf/)
    local-zone: "assets.xboxservices.com." typetransparent
    local-data: "assets.xboxservices.com. 300 IN AAAA ::"
    local-zone: "cms-assets.xboxservices.com." typetransparent
    local-data: "cms-assets.xboxservices.com. 300 IN AAAA ::"
    local-zone: "emerald.xboxservices.com." typetransparent
    local-data: "emerald.xboxservices.com. 300 IN AAAA ::"
    local-zone: "wcpstatic.microsoft.com." typetransparent
    local-data: "wcpstatic.microsoft.com. 300 IN AAAA ::"
    local-zone: "play.xbox.com." typetransparent
    local-data: "play.xbox.com. 300 IN AAAA ::"
    local-zone: "support.xbox.com." typetransparent
    local-data: "support.xbox.com. 300 IN AAAA ::"
    local-zone: "uhf-exp-fd-gbcrdgggfbggh0g3.b02.azurefd.net." typetransparent
    local-data: "uhf-exp-fd-gbcrdgggfbggh0g3.b02.azurefd.net. 300 IN AAAA ::"

remote-control:
    control-enable: yes
    control-interface: 127.0.0.1
    control-port: 8953
    control-use-cert: no

# DNS interno autoritativo para flexnet.in (zbx, gitea, git, grafana, etc)
forward-zone:
    name: "flexnet.in"
    forward-addr: 192.168.90.1

# Forward apenas para Cloudflare (9-11ms avg, consistente).
# Google DNS (8.8.8.8/8.8.4.4) removido: variação observada de 21ms-225ms
# nos testes, causando picos de latência aleatórios.
forward-zone:
    name: "."
    forward-addr: 1.1.1.1@53
    forward-addr: 1.0.0.1@53
    forward-first: no

dnstap:
    dnstap-enable: yes
    dnstap-bidirectional: yes
    dnstap-socket-path: "/var/dnstap/dnstap.sock"
    dnstap-log-client-response-messages: yes
    dnstap-log-client-query-messages: yes
    dnstap-log-resolver-query-messages: no
    dnstap-log-resolver-response-messages: no
    dnstap-log-forwarder-query-messages: no
    dnstap-log-forwarder-response-messages: no
